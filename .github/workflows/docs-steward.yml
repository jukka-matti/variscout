name: Docs Steward

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # to create the report issue

jobs:
  steward:
    name: Run docs steward
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for SHA-range queries)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Steward
        id: steward
        run: |
          pnpm docs:steward > /tmp/steward-report.md
          echo "report_path=/tmp/steward-report.md" >> "$GITHUB_OUTPUT"

      - name: Post report as Issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/steward-report.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Docs Steward report — ${today}`,
              body,
              labels: ['docs-steward', 'automated'],
            });
