name: Deploy Azure Staging

on:
  push:
    branches: [main]
    paths:
      - 'apps/azure/**'
      - 'packages/**'
      - 'infra/functions/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for Azure login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Validate lockfile integrity
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: pnpm test

      - name: Build Azure app
        run: pnpm --filter @variscout/azure-app build

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom.json

      - name: Assemble deployment package
        run: |
          mkdir -p deploy/dist
          cp -r apps/azure/dist/* deploy/dist/
          cp apps/azure/server.js deploy/server.js
          echo '{"type":"module","scripts":{"start":"node server.js"}}' > deploy/package.json
          cd deploy && zip -r ../variscout-azure.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@84a80cfe7e9889f35148ed88c307e6e93bf02578 # v3.0.7
        with:
          app-name: variscout-staging
          package: ./variscout-azure.zip

      - name: Verify health
        env:
          APP_NAME: variscout-staging
        run: |
          echo "Waiting for app to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_NAME}.azurewebsites.net/health" || true)
          if [ "${STATUS}" = "200" ]; then
            echo "Health check passed (HTTP 200)"
          else
            echo "App returned HTTP ${STATUS} (may still be starting)"
          fi

  deploy-function:
    needs: build-and-deploy
    if: vars.AZURE_FUNCTION_APP_NAME != ''
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install function dependencies
        working-directory: infra/functions
        run: npm install --production

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Function
        uses: azure/functions-action@02a16c5f3a5707fa97fca56c202cc2ef6cc7dccb # v1.5.4
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: infra/functions
