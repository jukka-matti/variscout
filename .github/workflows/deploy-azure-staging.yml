name: Deploy Azure Staging

on:
  push:
    branches: [main]
    paths:
      - 'apps/azure/**'
      - 'packages/**'
      - 'infra/functions/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for Azure login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Build Azure app
        run: pnpm --filter @variscout/azure-app build

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.json

      - name: Assemble deployment package
        run: |
          mkdir -p deploy/dist
          cp -r apps/azure/dist/* deploy/dist/
          cp apps/azure/server.js deploy/server.js
          echo '{"type":"module","scripts":{"start":"node server.js"}}' > deploy/package.json
          cd deploy && zip -r ../variscout-azure.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@2fdd5c3ebb4e540834e86ecc1f6fdcd5539023ee # v3.0.2
        with:
          app-name: variscout-staging
          package: ./variscout-azure.zip

      - name: Verify health endpoint
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://variscout-staging.azurewebsites.net/health || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP 200)"
          else
            echo "Health check returned HTTP $STATUS (app may still be starting)"
          fi

  deploy-function:
    needs: build-and-deploy
    if: vars.AZURE_FUNCTION_APP_NAME != ''
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install function dependencies
        working-directory: infra/functions
        run: npm install --production

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Function
        uses: azure/functions-action@02a16c5f3a5707fa97fca56c202cc2ef6cc7dccb # v1.5.4
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: infra/functions
