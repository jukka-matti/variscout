name: Deploy Azure Staging

on:
  workflow_dispatch:
  # push trigger disabled during active development (re-enable for integration testing)
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/azure/**'
  #     - 'packages/**'
  #     - 'infra/functions/**'
  #     - 'pnpm-lock.yaml'

permissions:
  id-token: write # OIDC token for Azure login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Validate lockfile integrity
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: pnpm test

      - name: Build Azure app
        run: pnpm --filter @variscout/azure-app build

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

      - name: Assemble deployment package
        run: |
          mkdir -p deploy/dist
          cp -r apps/azure/dist/* deploy/dist/
          cp apps/azure/server.js deploy/server.js
          echo '{"type":"module","scripts":{"start":"node server.js"}}' > deploy/package.json
          cd deploy && zip -r ../variscout-azure.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@84a80cfe7e9889f35148ed88c307e6e93bf02578 # v3.0.7
        with:
          app-name: variscout-staging
          package: ./variscout-azure.zip

      - name: Verify health
        env:
          APP_NAME: variscout-staging
        run: |
          echo "Waiting for app to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_NAME}.azurewebsites.net/health" || true)
          if [ "${STATUS}" = "200" ]; then
            echo "Health check passed (HTTP 200)"
          else
            echo "App returned HTTP ${STATUS} (may still be starting)"
          fi

  deploy-function:
    needs: build-and-deploy
    if: vars.AZURE_FUNCTION_APP_NAME != ''
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install function dependencies
        working-directory: infra/functions
        run: npm install --production

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Function
        uses: azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1.5.6
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: infra/functions
