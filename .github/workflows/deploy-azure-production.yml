name: Deploy Azure Production

# Production deployment via staging slot swap.
# Requires manual trigger — deployment to staging happens automatically via deploy-azure-staging.yml.
# Uses deployment slot swap for zero-downtime deployment with instant rollback capability.

on:
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: 'Skip pre-swap health check (use for emergency deploys)'
        required: false
        default: 'false'
        type: boolean

permissions:
  id-token: write # OIDC token for Azure login
  contents: read

jobs:
  swap-to-production:
    runs-on: ubuntu-latest
    environment: production # Requires manual approval via GitHub environment protection rules

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Health check staging slot
        if: inputs.skip_health_check != 'true'
        env:
          APP_NAME: variscout-staging
        run: |
          STAGING_URL="https://${APP_NAME}-staging.azurewebsites.net/health"
          echo "Checking staging slot health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}" --max-time 10 || true)
          if [ "${STATUS}" != "200" ]; then
            echo "::error::Staging slot health check failed (HTTP ${STATUS}). Aborting swap."
            exit 1
          fi
          echo "Staging slot is healthy (HTTP 200)"

      - name: Swap staging to production
        env:
          APP_NAME: variscout-staging
          RESOURCE_GROUP: rg-variscout-staging
        run: |
          echo "Swapping staging slot to production..."
          az webapp deployment slot swap \
            --name "${APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --slot staging \
            --target-slot production
          echo "Swap complete"

      - name: Verify production health
        env:
          APP_NAME: variscout-staging
        run: |
          echo "Waiting for production to stabilize..."
          sleep 10
          PROD_URL="https://${APP_NAME}.azurewebsites.net/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}" --max-time 10 || true)
          if [ "${STATUS}" = "200" ]; then
            echo "Production health check passed (HTTP 200)"
          else
            echo "::warning::Production health check returned HTTP ${STATUS} — may still be warming up"
          fi

  rollback:
    runs-on: ubuntu-latest
    needs: swap-to-production
    if: failure()
    # No environment gate — rollback must execute automatically without manual approval

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback — swap back
        env:
          APP_NAME: variscout-staging
          RESOURCE_GROUP: rg-variscout-staging
        run: |
          echo "::warning::Production deploy failed — rolling back via slot swap"
          az webapp deployment slot swap \
            --name "${APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --slot staging \
            --target-slot production
          echo "Rollback complete — previous version restored"
